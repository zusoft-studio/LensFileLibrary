## ACE Log Parameters
##   -f <log destination> a set of OSTREAM|STDERR|LOGGER|SYSLOG with a combination of VERBOSE_LITE|VERBOSE or SILENT
##   -s <LogFileName> ... logfile name
##   -o ... keep log files in order
##   -i <interval> ... check interval in seconds
##   -m <size> ... maximum file size in kB
##   -w ... wipe out existing log file
##   -N <arg> .. number of history files to keep
##   -p <log priorities> ... process wide log priorities
##   -t <log priorities> ... thread wide log priorities
##      a set of STARTUP|SHUTDOWN|TRACE|DEBUG|INFO|WARNING|NOTICE|ERROR|CRITICAL|ALERT|EMERGENCY
##      a ~ in front of a log priority disables it
##      the effective log mask is determined by or'ing the process and the thread mask.
##      e.g. STARTUP|SHUTDOWN|~TRACE|~DEBUG|~INFO|~WARNING|~NOTICE|ERROR|CRITICAL|ALERT|EMERGENCY
#* ACELogParams: Default=
